<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INDICANA — E2EE Encrypted Messaging</title>
  <meta name="description" content="INDICANA: secure, end-to-end encrypted one-to-one messaging. Keys stay on your device. The server never sees your messages." />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles/main.css?v=20260415-1" />

  <!--
    TweetNaCl + tweetnacl-util via CDN.
    These provide nacl (box, randomBytes, box.keyPair) and naclUtil (encode/decode).
  -->
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Script load order matters:
    crypto → store → api → ui modules → app (router)
  -->
  <script src="src/crypto.js?v=20260415-1"></script>
  <script src="src/store.js?v=20260415-1"></script>
  <script src="runtime-config.js?v=20260501-1"></script>
  <script src="src/config.js?v=20260415-1"></script>
  <script src="src/api.js?v=20260415-1"></script>
  <script src="src/ui/auth.js?v=20260415-1"></script>
  <script src="src/ui/userList.js?v=20260415-1"></script>
  <script src="src/ui/chat.js?v=20260415-1"></script>
  <script src="src/app.js?v=20260415-1"></script>
</body>
</html>
